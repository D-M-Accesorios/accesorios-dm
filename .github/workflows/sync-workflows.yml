name: Sync Shared Workflows to All Repos

on:
  push:
    branches: [main]
    paths:
      - 'shared-workflows/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo simulación (no escribe en los repos)'
        type: boolean
        default: false
      target_repo:
        description: 'Repo específico (vacío = todos)'
        type: string
        default: ''

jobs:
  sync:
    name: sync-workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Sync shared workflows to all service repos
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          ORG: ${{ vars.ORG_NAME }}
          DRY_RUN: ${{ inputs.dry_run }}
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          ALL_REPOS=(
            "accesorios-dm-api-gateway"
            "accesorios-dm-database"
            "accesorios-dm-inventory-service"
            "accesorios-dm-payment-service"
            "accesorios-dm-security-service"
            "accesorios-dm-frontend"
          )

          if [ -n "$TARGET_REPO" ]; then
            REPOS=("$TARGET_REPO")
          else
            REPOS=("${ALL_REPOS[@]}")
          fi

          WORKFLOWS=(
            "validate-branch-flow.yml"
            "validate-commits.yml"
          )

          TOTAL_UPDATED=0
          TOTAL_SKIPPED=0
          TOTAL_FAILED=0

          git config --global user.email "governance-bot@accesorios-dm"
          git config --global user.name "Governance Bot"

          for repo in "${REPOS[@]}"; do
            echo ""
            echo "━━━ ${repo} ━━━"

            REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${repo}.git"
            REPO_DIR="/tmp/sync-${repo}"

            if [ "$DRY_RUN" = "true" ]; then
              echo "  [DRY RUN] Sincronizaría workflows en ${repo}"
              TOTAL_UPDATED=$((TOTAL_UPDATED + ${#WORKFLOWS[@]}))
              continue
            fi

            if ! git clone --depth=1 "$REPO_URL" "$REPO_DIR" 2>&1; then
              echo "  ✗ Error clonando ${repo}"
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
              continue
            fi

            REPO_CHANGED=false

            for workflow in "${WORKFLOWS[@]}"; do
              WORKFLOW_SOURCE="shared-workflows/${workflow}"
              WORKFLOW_DEST="${REPO_DIR}/.github/workflows/${workflow}"

              if [ ! -f "$WORKFLOW_SOURCE" ]; then
                echo "  ⚠️  Fuente no encontrada: ${WORKFLOW_SOURCE}"
                continue
              fi

              mkdir -p "$(dirname "$WORKFLOW_DEST")"

              if [ -f "$WORKFLOW_DEST" ] && diff -q "$WORKFLOW_SOURCE" "$WORKFLOW_DEST" > /dev/null 2>&1; then
                echo "  ⏭  ${workflow} — sin cambios"
                TOTAL_SKIPPED=$((TOTAL_SKIPPED + 1))
              else
                cp "$WORKFLOW_SOURCE" "$WORKFLOW_DEST"
                echo "  ✎  ${workflow} — actualizado"
                REPO_CHANGED=true
              fi
            done

            if [ "$REPO_CHANGED" = true ]; then
              cd "$REPO_DIR"
              git add .github/workflows/
              git commit -m "ci: sync governance workflows from accesorios-dm [skip ci]"
              if git push origin HEAD:main 2>&1; then
                echo "  ✓ Push exitoso"
                TOTAL_UPDATED=$((TOTAL_UPDATED + 1))
              else
                echo "  ✗ Error en push"
                TOTAL_FAILED=$((TOTAL_FAILED + 1))
              fi
              cd - > /dev/null
            fi

            rm -rf "$REPO_DIR"
          done

          echo ""
          echo "═══════════════════════════════════"
          echo "  Resumen de sincronización"
          echo "═══════════════════════════════════"
          echo "  Repos actualizados : ${TOTAL_UPDATED}"
          echo "  Workflows sin cambio: ${TOTAL_SKIPPED}"
          echo "  Fallidos           : ${TOTAL_FAILED}"
          echo "═══════════════════════════════════"

          if [ "$TOTAL_FAILED" -gt 0 ]; then
            exit 1
          fi
