name: Sync Shared Workflows to All Repos

on:
  push:
    branches: [main]
    paths:
      - 'shared-workflows/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo simulaciГіn (no escribe en los repos)'
        type: boolean
        default: false
      target_repo:
        description: 'Repo especГ­fico (vacГ­o = todos)'
        type: string
        default: ''

jobs:
  sync:
    name: sync-workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Sync validate-branch-flow.yml to all service repos
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          ORG: ${{ vars.ORG_NAME }}
          DRY_RUN: ${{ inputs.dry_run }}
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          # Repositorios de servicios que reciben los workflows compartidos
          ALL_REPOS=(
            "accesorios-dm-api-gateway"
            "accesorios-dm-database"
            "accesorios-dm-inventory-service"
            "accesorios-dm-payment-service"
            "accesorios-dm-security-service"
            "accesorios-dm-frontend"
          )

          # Si se especificГі un repo concreto, solo sincronizar ese
          if [ -n "$TARGET_REPO" ]; then
            REPOS=("$TARGET_REPO")
          else
            REPOS=("${ALL_REPOS[@]}")
          fi

          # Workflows a sincronizar en todos los repos de servicio
          WORKFLOWS=(
            "validate-branch-flow.yml"
            "validate-commits.yml"
          )

          TOTAL_UPDATED=0
          TOTAL_SKIPPED=0
          TOTAL_FAILED=0

          for workflow in "${WORKFLOWS[@]}"; do
            WORKFLOW_SOURCE="shared-workflows/${workflow}"
            WORKFLOW_DEST=".github/workflows/${workflow}"

            if [ ! -f "$WORKFLOW_SOURCE" ]; then
              echo "вљ пёЏ  Archivo fuente no encontrado: ${WORKFLOW_SOURCE} вЂ” saltando"
              continue
            fi

            CONTENT=$(base64 < "$WORKFLOW_SOURCE" | tr -d '\n')
            UPDATED=0
            SKIPPED=0
            FAILED=0

            echo ""
            echo "в”Ѓв”Ѓв”Ѓ Sincronizando: ${workflow} в”Ѓв”Ѓв”Ѓ"

            for repo in "${REPOS[@]}"; do
              echo ""
              echo "в†’ ${repo}"

              CURRENT=$(gh api "repos/${ORG}/${repo}/contents/${WORKFLOW_DEST}" 2>/dev/null || echo "NOT_FOUND")

              if echo "$CURRENT" | grep -q '"sha"'; then
                SHA=$(echo "$CURRENT" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
                CURRENT_CONTENT=$(echo "$CURRENT" | python3 -c "import sys,json; print(json.load(sys.stdin)['content'])" | tr -d '\n')

                if [ "$CURRENT_CONTENT" = "$CONTENT" ]; then
                  echo "  вЏ­  Sin cambios"
                  SKIPPED=$((SKIPPED + 1))
                  continue
                fi

                if [ "$DRY_RUN" = "true" ]; then
                  echo "  [DRY RUN] ActualizarГ­a ${workflow} en ${repo}"
                  UPDATED=$((UPDATED + 1))
                  continue
                fi

                gh api "repos/${ORG}/${repo}/contents/${WORKFLOW_DEST}" \
                  -X PUT \
                  -f message="ci: sync ${workflow} from governance [skip ci]" \
                  -f content="$CONTENT" \
                  -f sha="$SHA" > /dev/null && {
                    echo "  вњ“ Actualizado"
                    UPDATED=$((UPDATED + 1))
                  } || {
                    echo "  вњ— Error actualizando"
                    FAILED=$((FAILED + 1))
                  }
              else
                if [ "$DRY_RUN" = "true" ]; then
                  echo "  [DRY RUN] CrearГ­a ${workflow} en ${repo}"
                  UPDATED=$((UPDATED + 1))
                  continue
                fi

                gh api "repos/${ORG}/${repo}/contents/${WORKFLOW_DEST}" \
                  -X PUT \
                  -f message="ci: add ${workflow} from governance [skip ci]" \
                  -f content="$CONTENT" > /dev/null && {
                    echo "  вњ“ Creado"
                    UPDATED=$((UPDATED + 1))
                  } || {
                    echo "  вњ— Error creando"
                    FAILED=$((FAILED + 1))
                  }
              fi
            done

            TOTAL_UPDATED=$((TOTAL_UPDATED + UPDATED))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
            TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
          done

          echo ""
          echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"
          echo "  Resumen de sincronizaciГіn"
          echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"
          echo "  Actualizados : ${TOTAL_UPDATED}"
          echo "  Sin cambios  : ${TOTAL_SKIPPED}"
          echo "  Fallidos     : ${TOTAL_FAILED}"
          echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"

          if [ "$TOTAL_FAILED" -gt 0 ]; then
            exit 1
          fi
