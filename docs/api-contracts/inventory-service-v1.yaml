openapi: 3.1.0

info:
  title: Accesorios DM — Inventory Service API
  description: |
    API REST del Inventory Service. Gestiona el catálogo de productos
    (categorías, materiales, productos, imágenes) y los movimientos de
    inventario (stock, entradas, salidas, ajustes).

    **Acceso**: todas las rutas requieren autenticación JWT válida (excepto /health).
    El token se valida en el API Gateway antes de llegar a este servicio.
    La identidad del usuario autenticado se propaga mediante headers internos.

    **Versionamiento**: ADR-008 — todas las rutas bajo `/api/v1/`.
    **Errores**: ADR-009 — formato estándar unificado.
    **Datos**: ADR-005 — schemas `catalogo` e `inventario` de PostgreSQL.

    **PKs**: los IDs son de tipo Integer (SERIAL en PostgreSQL), no UUID.
    **Stock**: mantenido automáticamente por triggers de base de datos.
    **Movimientos**: cantidad positiva = entrada, negativa = salida (almacenado así en DB).
  version: 1.1.0
  contact:
    name: Sergio Andrés Losada Bahamón
    email: smugnodev@gmail.com

servers:
  - url: http://localhost:8082
    description: Desarrollo local (directo al servicio)
  - url: http://localhost:3000
    description: Desarrollo local (vía API Gateway — usar este)

tags:
  - name: Categorías
    description: Gestión de categorías del catálogo
  - name: Materiales
    description: Gestión de tipos de material
  - name: Productos
    description: Gestión del catálogo de productos
  - name: Inventario
    description: Stock y movimientos de inventario
  - name: Health
    description: Estado del servicio

security:
  - BearerAuth: []

paths:

  # ── HEALTH ──────────────────────────────────────────────────────────────────
  /api/v1/health:
    get:
      tags: [Health]
      summary: Estado del inventory service
      security: []
      responses:
        '200':
          description: Servicio disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: UP
                timestamp: '2026-05-10T22:00:00.000Z'

  /health:
    get:
      tags: [Health]
      summary: Estado del API Gateway
      description: Endpoint del gateway. Sin autenticación.
      security: []
      responses:
        '200':
          description: Gateway disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/services:
    get:
      tags: [Health]
      summary: Estado del gateway y sus dependencias
      security: []
      responses:
        '200':
          description: Estado de todos los servicios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicesHealthResponse'
              example:
                status: DEGRADED
                timestamp: '2026-05-10T22:00:00.000Z'
                services:
                  security-service:
                    status: DOWN
                    responseTimeMs: null
                  inventory-service:
                    status: UP
                    responseTimeMs: 12

  # ── CATEGORÍAS ──────────────────────────────────────────────────────────────
  /api/v1/catalog/categories:
    get:
      tags: [Categorías]
      summary: Listar categorías activas
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista paginada de categorías activas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCategories'
              example:
                content:
                  - id: 1
                    nombre: Anillos
                    descripcion: Anillos en diferentes estilos
                    estado: true
                  - id: 2
                    nombre: Collares
                    descripcion: Collares y gargantillas
                    estado: true
                page:
                  size: 20
                  number: 0
                  totalElements: 4
                  totalPages: 1
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Categorías]
      summary: Crear categoría
      description: Requiere rol `ADMIN`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
            example:
              nombre: Pulseras
              descripcion: Pulseras y brazaletes
      responses:
        '201':
          description: Categoría creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
              example:
                id: 5
                nombre: Pulseras
                descripcion: Pulseras y brazaletes
                estado: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/catalog/categories/{id}:
    parameters:
      - $ref: '#/components/parameters/IntIdParam'

    get:
      tags: [Categorías]
      summary: Obtener una categoría
      responses:
        '200':
          description: Categoría encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Categorías]
      summary: Actualizar categoría
      description: Requiere rol `ADMIN`. Solo se actualizan los campos enviados.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdateRequest'
      responses:
        '200':
          description: Categoría actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Categorías]
      summary: Eliminar categoría
      description: Requiere rol `ADMIN`. Falla si tiene productos asociados.
      responses:
        '204':
          description: Categoría eliminada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── MATERIALES ──────────────────────────────────────────────────────────────
  /api/v1/catalog/materials:
    get:
      tags: [Materiales]
      summary: Listar materiales
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista paginada de materiales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedMaterials'
              example:
                content:
                  - id: 1
                    nombre: General
                    descripcion: Material general
                  - id: 2
                    nombre: Oro 18K
                    descripcion: Oro de 18 quilates
                  - id: 3
                    nombre: Plata 925
                    descripcion: Plata esterlina
                  - id: 4
                    nombre: Acero Inoxidable
                    descripcion: Acero quirurgico
                page:
                  size: 20
                  number: 0
                  totalElements: 4
                  totalPages: 1
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Materiales]
      summary: Crear material
      description: Requiere rol `ADMIN`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialCreateRequest'
      responses:
        '201':
          description: Material creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/catalog/materials/{id}:
    parameters:
      - $ref: '#/components/parameters/IntIdParam'

    get:
      tags: [Materiales]
      summary: Obtener un material
      responses:
        '200':
          description: Material encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Materiales]
      summary: Actualizar material
      description: Requiere rol `ADMIN`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialUpdateRequest'
      responses:
        '200':
          description: Material actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Materiales]
      summary: Eliminar material
      description: Requiere rol `ADMIN`. Falla si tiene productos asociados.
      responses:
        '204':
          description: Material eliminado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── PRODUCTOS ───────────────────────────────────────────────────────────────
  /api/v1/catalog/products:
    get:
      tags: [Productos]
      summary: Listar productos con filtros
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
          description: Filtrar por ID de categoría
        - name: materialId
          in: query
          schema:
            type: integer
          description: Filtrar por ID de material
        - name: nombre
          in: query
          schema:
            type: string
          description: Búsqueda parcial por nombre (case-insensitive)
        - name: estado
          in: query
          schema:
            type: boolean
          description: true = activos, false = inactivos
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista paginada de productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedProducts'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Productos]
      summary: Crear producto
      description: Requiere rol `ADMIN`. El stock inicia en 0.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
            example:
              nombre: Collar de plata 925
              descripcion: Collar artesanal con dije de corazón
              precio: 85000
              categoriaId: 2
              materialId: 3
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Categoría o material no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/catalog/products/{id}:
    parameters:
      - $ref: '#/components/parameters/IntIdParam'

    get:
      tags: [Productos]
      summary: Detalle de un producto (incluye imágenes)
      responses:
        '200':
          description: Producto con imágenes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
              example:
                id: 1
                nombre: Collar de plata 925
                descripcion: Collar artesanal con dije de corazón
                precio: 85000.00
                stock: 42
                estado: true
                categoria:
                  id: 2
                  nombre: Collares
                material:
                  id: 3
                  nombre: Plata 925
                imagenes:
                  - id: 1
                    urlImagen: https://cdn.example.com/collar-01.jpg
                    orden: 1
                fechaCreacion: '2026-05-10T20:00:00'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Productos]
      summary: Actualizar producto
      description: Requiere rol `ADMIN`. Solo los campos enviados se actualizan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Productos]
      summary: Desactivar producto (soft delete)
      description: |
        Requiere rol `ADMIN`.
        No elimina el registro — pone `estado: false`.
      responses:
        '204':
          description: Producto desactivado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/catalog/products/{id}/images:
    parameters:
      - $ref: '#/components/parameters/IntIdParam'

    get:
      tags: [Productos]
      summary: Listar imágenes de un producto
      responses:
        '200':
          description: Lista de imágenes ordenadas por `orden`
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductImageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── STOCK ───────────────────────────────────────────────────────────────────
  /api/v1/inventory/stock:
    get:
      tags: [Inventario]
      summary: Stock de todos los productos activos
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista paginada de stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedStock'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/inventory/stock/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
        description: ID del producto

    get:
      tags: [Inventario]
      summary: Stock de un producto
      responses:
        '200':
          description: Stock del producto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
              example:
                productoId: 1
                nombre: Collar de plata 925
                cantidadDisponible: 42
                fechaCreacion: '2026-05-10T20:00:00'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── MOVIMIENTOS ─────────────────────────────────────────────────────────────
  /api/v1/inventory/movements:
    get:
      tags: [Inventario]
      summary: Historial de movimientos
      description: Requiere rol `ADMIN`.
      parameters:
        - name: productoId
          in: query
          schema:
            type: integer
          description: Filtrar por producto
        - name: tipoMovimientoId
          in: query
          schema:
            type: integer
          description: 1=ENTRADA, 2=SALIDA, 3=AJUSTE
        - name: fechaDesde
          in: query
          schema:
            type: string
            format: date-time
          description: ISO 8601 sin zona horaria (ej. 2026-05-01T00:00:00)
        - name: fechaHasta
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista paginada de movimientos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedMovements'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Rango de fechas inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Inventario]
      summary: Registrar movimiento
      description: |
        Requiere rol `ADMIN` o `VENDEDOR`.

        - **ENTRADA** (id=1): suma la cantidad al stock del producto.
        - **SALIDA** (id=2): resta la cantidad. Falla si stock insuficiente.
        - **AJUSTE** (id=3): suma (puede resultar negativo si el stock inicial es bajo).

        `cantidad` siempre se envía como entero positivo. El servicio maneja el signo internamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovementRequest'
            examples:
              entrada:
                summary: Entrada de inventario
                value:
                  productoId: 1
                  tipoMovimientoId: 1
                  cantidad: 20
                  referencia: Reposición proveedor ABC
              salida:
                summary: Salida por venta
                value:
                  productoId: 1
                  tipoMovimientoId: 2
                  cantidad: 5
                  referencia: Venta pedido #1234
      responses:
        '201':
          description: Movimiento registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovementResponse'
              example:
                id: 1
                productoId: 1
                tipoMovimiento:
                  id: 1
                  nombre: ENTRADA
                cantidad: 20
                referencia: Reposición proveedor ABC
                fechaMovimiento: '2026-05-10T22:15:00'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Producto o tipo de movimiento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Stock insuficiente o datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficient_stock:
                  summary: Stock insuficiente
                  value:
                    status: 422
                    error: INSUFFICIENT_STOCK
                    message: "Stock insuficiente para el producto '1'. Solicitado: 100, disponible: 42."
                    path: /api/v1/inventory/movements
                    timestamp: '2026-05-10T22:00:00.000Z'
                    traceId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    details: []

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Access token JWT firmado con RS256. Validado por el API Gateway.
        En desarrollo usar: `node scripts/generate-dev-token.js` (en dm-deployment).

  parameters:
    IntIdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID entero del recurso

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Número de página (base 0)

    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Cantidad de elementos por página

  responses:
    Unauthorized:
      description: Token ausente, inválido o expirado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 401
            error: UNAUTHORIZED
            message: Token de acceso requerido.
            path: /api/v1/catalog/products
            timestamp: '2026-05-10T22:00:00.000Z'
            traceId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            details: []

    Forbidden:
      description: Sin permisos para esta operación
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 403
            error: INSUFFICIENT_PERMISSIONS
            message: Se requiere el rol ADMIN para esta operación.
            path: /api/v1/catalog/categories
            timestamp: '2026-05-10T22:00:00.000Z'
            traceId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            details: []

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 404
            error: PRODUCT_NOT_FOUND
            message: El producto solicitado no fue encontrado.
            path: /api/v1/catalog/products/999
            timestamp: '2026-05-10T22:00:00.000Z'
            traceId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            details: []

    Conflict:
      description: Conflicto — el recurso tiene dependencias
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 409
            error: CATEGORY_HAS_PRODUCTS
            message: La categoría '1' tiene productos asociados y no puede eliminarse.
            path: /api/v1/catalog/categories/1
            timestamp: '2026-05-10T22:00:00.000Z'
            traceId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            details: []

    ValidationError:
      description: Error de validación de campos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 422
            error: VALIDATION_ERROR
            message: La solicitud contiene campos inválidos.
            path: /api/v1/catalog/products
            timestamp: '2026-05-10T22:00:00.000Z'
            traceId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            details:
              - field: precio
                rejectedValue: -500
                message: El precio debe ser mayor a 0

  schemas:

    # ── ERROR (ADR-009) ─────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [status, error, message, path, timestamp, traceId, details]
      properties:
        status:
          type: integer
        error:
          type: string
          description: Código en UPPER_SNAKE_CASE
        message:
          type: string
        path:
          type: string
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
          format: uuid
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationDetail'

    ValidationDetail:
      type: object
      properties:
        field:
          type: string
        rejectedValue: {}
        message:
          type: string

    # ── HEALTH ──────────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP, DOWN]
        timestamp:
          type: string
          format: date-time

    ServicesHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP, DEGRADED, DOWN]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
                enum: [UP, DOWN]
              responseTimeMs:
                type: integer
                nullable: true

    # ── PAGINATION ──────────────────────────────────────────────────────────
    PageMetadata:
      type: object
      properties:
        size:
          type: integer
        number:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    # ── CATEGORÍAS ──────────────────────────────────────────────────────────
    CategoryCreateRequest:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 80
        descripcion:
          type: string
          maxLength: 500

    CategoryUpdateRequest:
      type: object
      properties:
        nombre:
          type: string
          maxLength: 80
        descripcion:
          type: string
          maxLength: 500
        activo:
          type: boolean
          description: Mapea al campo `estado` en la base de datos

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
          description: ID SERIAL de la categoría
        nombre:
          type: string
        descripcion:
          type: string
          nullable: true
        estado:
          type: boolean

    PagedCategories:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CategoryResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'

    # ── MATERIALES ──────────────────────────────────────────────────────────
    MaterialCreateRequest:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 80
        descripcion:
          type: string
          maxLength: 500

    MaterialUpdateRequest:
      type: object
      properties:
        nombre:
          type: string
          maxLength: 80
        descripcion:
          type: string
          maxLength: 500

    MaterialResponse:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        descripcion:
          type: string
          nullable: true

    PagedMaterials:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/MaterialResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'

    # ── PRODUCTOS ───────────────────────────────────────────────────────────
    ProductCreateRequest:
      type: object
      required: [nombre, precio, categoriaId, materialId]
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 150
        descripcion:
          type: string
          maxLength: 2000
          nullable: true
        precio:
          type: number
          format: double
          exclusiveMinimum: 0
        categoriaId:
          type: integer
        materialId:
          type: integer
          description: Requerido — el material no puede ser nulo

    ProductUpdateRequest:
      type: object
      properties:
        nombre:
          type: string
          maxLength: 150
        descripcion:
          type: string
          maxLength: 2000
        precio:
          type: number
          exclusiveMinimum: 0
        categoriaId:
          type: integer
        materialId:
          type: integer
        estado:
          type: boolean

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        precio:
          type: number
        stock:
          type: integer
          description: Stock actual, mantenido por triggers de base de datos
        estado:
          type: boolean
        categoria:
          $ref: '#/components/schemas/CategoryInfoResponse'
        material:
          $ref: '#/components/schemas/MaterialInfoResponse'
        fechaCreacion:
          type: string
          format: date-time
          description: Timestamp sin zona horaria (LocalDateTime)

    ProductDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ProductResponse'
        - type: object
          properties:
            descripcion:
              type: string
              nullable: true
            imagenes:
              type: array
              items:
                $ref: '#/components/schemas/ProductImageResponse'

    CategoryInfoResponse:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string

    MaterialInfoResponse:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string

    ProductImageResponse:
      type: object
      properties:
        id:
          type: integer
        urlImagen:
          type: string
          format: uri
        orden:
          type: integer
          description: Orden de visualización (1 = primero)

    PagedProducts:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'

    # ── INVENTARIO ──────────────────────────────────────────────────────────
    StockResponse:
      type: object
      properties:
        productoId:
          type: integer
        nombre:
          type: string
        cantidadDisponible:
          type: integer
          minimum: 0
        fechaCreacion:
          type: string
          format: date-time

    PagedStock:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/StockResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'

    MovementRequest:
      type: object
      required: [productoId, tipoMovimientoId, cantidad]
      properties:
        productoId:
          type: integer
        tipoMovimientoId:
          type: integer
          description: 1=ENTRADA, 2=SALIDA, 3=AJUSTE
        cantidad:
          type: integer
          minimum: 1
          description: Siempre positivo. El servicio maneja el signo según el tipo.
        referencia:
          type: string
          maxLength: 100
          nullable: true
          description: Referencia opcional (pedido, proveedor, etc.)

    MovementResponse:
      type: object
      properties:
        id:
          type: integer
        productoId:
          type: integer
        tipoMovimiento:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
        cantidad:
          type: integer
          description: Positivo=entrada, negativo=salida (tal como queda almacenado)
        referencia:
          type: string
          nullable: true
        fechaMovimiento:
          type: string
          format: date-time

    MovementHistoryResponse:
      type: object
      properties:
        id:
          type: integer
        producto:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
        tipoMovimiento:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
        cantidad:
          type: integer
        referencia:
          type: string
          nullable: true
        fechaMovimiento:
          type: string
          format: date-time

    PagedMovements:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/MovementHistoryResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'
